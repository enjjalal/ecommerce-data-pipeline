name: Data Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ecommerce-pipeline-498214
  GCP_KEY_PATH: /tmp/gcp_key.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    name: Run dbt + FinOps Audit
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Decode GCP service account key from GitHub Secret ──────────────
      # The secret is stored as base64 to safely hold the JSON content.
      # We decode it back to a JSON file at /tmp/gcp_key.json for this run only.
      - name: Authenticate to GCP
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 --decode > $GCP_KEY_PATH
          echo "GCP key written to $GCP_KEY_PATH"

      # ── 5. Write dbt profiles.yml ─────────────────────────────────────────
      # profiles.yml lives outside the repo (~/.dbt/) so we create it at runtime.
      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_pipeline:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ env.PROJECT_ID }}
                dataset: dev
                keyfile: ${{ env.GCP_KEY_PATH }}
                location: US
                threads: 4
                timeout_seconds: 300
          EOF

      # ── 6. dbt run — build all models ─────────────────────────────────────
      - name: dbt run
        working-directory: dbt_project
        run: dbt run --profiles-dir ~/.dbt

      # ── 7. dbt test — enforce data quality gates ──────────────────────────
      # We use --warn-error to treat warnings as errors for strict CI,
      # but allow the known intentional failure (shipping date test) by
      # excluding it here — it is documented and tracked separately.
      - name: dbt test
        working-directory: dbt_project
        run: |
          dbt test --profiles-dir ~/.dbt \
            --exclude assert_shipping_date_after_order_date
        continue-on-error: false

      # ── 8. dbt test — run the intentional failure test separately ─────────
      # This test is expected to find bad rows (injected in data generation).
      # We run it separately so it is visible in CI logs but does not block merge.
      - name: dbt test (known bad data — informational)
        working-directory: dbt_project
        run: |
          dbt test --profiles-dir ~/.dbt \
            --select assert_shipping_date_after_order_date
        continue-on-error: true

      # ── 9. FinOps audit — flag expensive queries before merge ─────────────
      - name: Run FinOps Auditor
        env:
          GCP_KEY_PATH: ${{ env.GCP_KEY_PATH }}
        run: python finops/finops_auditor.py

      # ── 10. Upload FinOps report as CI artifact ───────────────────────────
      # The report is available for download from the GitHub Actions run page.
      - name: Upload FinOps report
        uses: actions/upload-artifact@v4
        with:
          name: finops-report
          path: reports/finops_report.md
          retention-days: 30
