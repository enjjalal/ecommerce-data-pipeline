version: 2

sources:
  - name: raw_stage
    database: ecommerce-pipeline-498214
    schema: raw_stage
    description: "Raw e-commerce event data loaded from the mock data generator"

    tables:
      - name: raw_transactions
        description: "Raw order/transaction events — 600,000 rows"
        columns:
          - name: order_id
            description: "Unique identifier for each order"
          - name: user_id
            description: "Foreign key to the user who placed the order"
          - name: product_id
            description: "Product purchased"
          - name: category
            description: "Product category"
          - name: quantity
            description: "Units purchased"
          - name: unit_price
            description: "Price per unit in USD"
          - name: discount_pct
            description: "Discount applied as a decimal (0.0 - 0.40)"
          - name: status
            description: "Order status: completed, pending, cancelled, refunded"
          - name: payment_method
            description: "Payment method used"
          - name: order_date
            description: "Timestamp when order was placed"
          - name: shipping_date
            description: "Timestamp when order was shipped"
          - name: country
            description: "ISO country code of the customer"
          - name: city
            description: "City of the customer"

      - name: raw_user_clicks
        description: "Raw clickstream/session events — 300,000 rows"
        columns:
          - name: click_id
            description: "Unique identifier for each click event"
          - name: user_id
            description: "Foreign key to the user"
          - name: session_id
            description: "Session grouping identifier"
          - name: page
            description: "Page path visited"
          - name: device
            description: "Device type: desktop, mobile, tablet"
          - name: referrer
            description: "Traffic source"
          - name: time_on_page_sec
            description: "Seconds spent on the page"
          - name: clicked_cta
            description: "Whether the user clicked a call-to-action"
          - name: timestamp
            description: "Timestamp of the click event"

      - name: raw_system_errors
        description: "Raw system error logs — 100,000 rows"
        columns:
          - name: error_id
            description: "Unique identifier for each error event"
          - name: service
            description: "Microservice that threw the error"
          - name: error_code
            description: "HTTP or internal error code"
          - name: severity
            description: "Error severity: critical, high, medium, low"
          - name: message
            description: "Error message"
          - name: stack_trace
            description: "Full stack trace text"
          - name: resolved
            description: "Whether the error has been resolved"
          - name: timestamp
            description: "Timestamp of the error"
